<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3.feladat</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f4f7f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 30px;
        }

        .golyok-container {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            min-height: 80px;
        }

        .golyó {
            width: 70px;
            height: 70px;
            background: radial-gradient(circle at 30% 30%, #ffd700, #daa520);
            color: #333;
            font-size: 24px;
            font-weight: bold;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
            animation: popIn 0.4s ease-out forwards;
            transform: scale(0);
        }

        @keyframes popIn {
            to {
                transform: scale(1);
            }
        }

        .sorsolas-gomb {
            padding: 15px 35px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background-color: #27ae60;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: all 0.2s ease;
        }

            .sorsolas-gomb:hover {
                background-color: #219150;
                transform: translateY(-2px);
            }
    </style>
</head>
<body>

    <h1>Erzsi néni Lottógépe</h1>

    <div class="golyok-container" id="lottoGolyok"></div>

    <button class="sorsolas-gomb" onclick="megjelentLotto()">Sorsolás indítása</button>

    <script src="lotto.js"></script>

</body>
</html>
